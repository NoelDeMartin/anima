    title: Delete `{name}`
    message: Are you sure you want to delete this provider? Its models will no longer be usable.
  names:
    browser: Browser (local)
    openai: OpenAI
  instructions:
    anthropic: You can get your API Key in [Anthropic's Claude Console](https://platform.claude.com/settings/keys).
    openai: You can get your API Key in [OpenAI's Platform](https://platform.openai.com/api-keys).
    google: You can get your API Key in [Google's AI Studio](https://aistudio.google.com/app/api-keys).
    ollama: |
      If you want to access a local Ollama instance from the browser, you'll need to [configure CORS origins](https://docs.ollama.com/faq#how-can-i-allow-additional-web-origins-to-access-ollama)
      and probably serve Ollama behind a tunnel (such as [ngrok](https://docs.ollama.com/faq#how-can-i-use-ollama-with-ngrok) or [Cloudfare Tunnel](https://docs.ollama.com/faq#how-can-i-use-ollama-with-cloudflare-tunnel))
      in order to bypass Mixed Content restrictions.
    other: |
      Missing a provider? This app supports pretty much everything that can be used with [Vercel's AI SDK](https://ai-sdk.dev/).
      If you need one that isn't listed here, just [let me know](https://github.com/noeldemartin/anima/issues).
  unavailable:
    browser: |
      Built-in models are are not available right now. This could be because you don't have enough free space in your device, or
      your it doesn't meet the requirements. [learn more](https://developer.chrome.com/docs/ai/prompt-api)
  unsupported:
    browser: Built-in models are not supported in this browser, try using Chrome or Edge. [learn more](https://developer.chrome.com/docs/ai/prompt-api)

