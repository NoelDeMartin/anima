name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: '.node-version'
          cache: true
      - uses: oven-sh/setup-bun@v2
      - run: vp check
      - run: vp run build -r

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: '.node-version'
          cache: true
      - uses: oven-sh/setup-bun@v2
      - run: vp run e2e#install-deps
      - run: vp run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() && failure() }}
        with:
          name: test-results
          path: e2e/test-results/
          retention-days: 30

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ORIGIN_TRIALS: ${{ secrets.ORIGIN_TRIALS }}
      VITE_SPA_MODE: 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: '.node-version'
          cache: true
      - uses: oven-sh/setup-bun@v2
      - run: vp run frontend#deploy
